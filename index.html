<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JONY · creative director</title>
    <!-- Font Awesome 5 (free) for clean icons, minimal style -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf9f6;   /* soft off-white, like premium paper */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1e1e1e;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* main container – clean max-width, generous padding */
        .site-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2.2rem 2.5rem;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER / NAVIGATION (exactly as in description) === */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 0.5rem 0 2rem 0;
            border-bottom: none;  /* clean, no line – keeps minimal feel */
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1e1e1e;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            font-weight: 500;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #2b2b2b;
            font-size: 1rem;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            color: #000;
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 1.5px;
        }

        /* special style for "Let's Talk" – subtle border / pill */
        .nav-links .talk-link {
            border: 1.5px solid #1e1e1e;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            background-color: transparent;
            transition: 0.2s;
            margin-left: 0.25rem;
            color: #1e1e1e;
            text-decoration: none;
            display: inline-block;
        }

        .nav-links .talk-link:hover {
            background-color: #1e1e1e;
            color: #ffffff;
            text-decoration: none;
        }

        /* make mobile friendly: wrap with gap */
        @media (max-width: 750px) {
            .navbar {
                flex-direction: column;
                align-items: start;
                gap: 1.2rem;
            }
            .nav-links {
                gap: 1.2rem 1.8rem;
            }
        }

        /* === HERO SECTION (exact replica of text block) === */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;   /* vertical center in remaining space */
            margin-top: 2rem;
            margin-bottom: 4rem;
        }

        .hero-content {
            max-width: 850px;
        }

        /* "Hi There, I Am Jony" – modern spacious typography */
        .hero-greeting {
            font-size: 2.2rem;
            font-weight: 400;
            color: #3a3a3a;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }

        .hero-name {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1.05;
            margin: 0.2rem 0 0.5rem 0;
            letter-spacing: -0.03em;
            color: #1a1a1a;
        }

        .hero-title {
            font-size: 2.2rem;
            font-weight: 400;
            color: #3a3a3a;
            margin-bottom: 2.5rem;
            letter-spacing: -0.01em;
        }

        /* view works button – clean & outline, similar to "Let's Talk" but larger */
        .btn-view-works {
            display: inline-block;
            border: 2px solid #1e1e1e;
            background: transparent;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: #1e1e1e;
            letter-spacing: 1px;
            border-radius: 40px;
            transition: background 0.2s, color 0.2s;
            margin-top: 1.2rem;
        }

        .btn-view-works:hover {
            background: #1e1e1e;
            color: #ffffff;
            cursor: pointer;
        }

        /* optional small hint of personality: very subtle line */
        .footer-credit {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #9b9b9b;
            border-top: 1px solid #e2e2e2;
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-credit .left {
            font-weight: 300;
        }

        .footer-credit .right i {
            color: #3d3d3d;
            margin: 0 5px;
        }

        /* adjust for smaller screens */
        @media (max-width: 550px) {
            .hero-name {
                font-size: 4rem;
            }
            .hero-greeting, .hero-title {
                font-size: 1.6rem;
            }
            .site-container {
                padding: 1.5rem 1.5rem;
            }
        }

        /* make sure the 'Home Works Services Pages About Blog Contact' is exactly as described */
        /* no extra words, exactly the list from png */
    </style>
</head>
