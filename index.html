<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jony · 3D resume world</title>
  <!-- Font Awesome (simple icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Teleram, 'Helvetica Neue', sans-serif;
      color: white;
    }

    /* --- UI overlay: inspired by wr.png clean layout + Jony intro --- */
    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none; /* allow click-through to canvas, but we enable on child panels */
      z-index: 10;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
      padding: 2rem 3rem;
      box-sizing: border-box;
    }

    /* top navigation – exactly "Home Works Services Pages About Blog Contact" + Let's Talk */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: auto;
      background: rgba(10, 10, 20, 0.3);
      backdrop-filter: blur(8px);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.15);
      width: fit-content;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .nav-links span {
      cursor: default;
      font-size: 1.1rem;
      opacity: 0.9;
      transition: 0.2s;
    }
    .nav-links span:hover { opacity: 1; text-shadow: 0 0 10px #7aa6ff; }

    .lets-talk {
      background: rgba(255,255,255,0.9);
      color: #0b0b1f;
      padding: 0.5rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      margin-left: 2rem;
      border: none;
      cursor: default;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      transition: 0.2s;
    }
    .lets-talk:hover {
      background: white;
      transform: scale(1.02);
    }

    /* left bottom – "Hi There, I Am Jony · Creative Director · View Works" */
    .hero-section {
      pointer-events: auto;
      max-width: 600px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(5px);
      border-radius: 40px;
      padding: 2rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      margin-bottom: 2rem;
    }

    .hero-greeting {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.1;
      text-shadow: 0 4px 15px black;
    }
    .hero-greeting small {
      font-size: 1.3rem;
      font-weight: 400;
      display: block;
      margin-top: 0.2rem;
      letter-spacing: 2px;
      color: #e0e0ff;
    }
    .hero-title {
      font-size: 1.7rem;
      font-weight: 300;
      margin: 0.8rem 0 1.5rem 0;
      color: #cfd9ff;
    }
    .view-works-btn {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 0.9rem 2.8rem;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
      cursor: default;
      transition: 0.25s;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      display: inline-block;
    }
    .view-works-btn:hover {
      background: white;
      color: #0b0b1f;
      border-color: white;
    }

    /* right side – photo card (from wr.png "JONY." + photo) */
    .photo-card {
      pointer-events: auto;
      position: absolute;
      bottom: 3rem;
      right: 3rem;
      width: 260px;
      background: rgba(20, 20, 35, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 1.8rem 1.8rem 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6);
      text-align: center;
      animation: float 6s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .photo-name {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff8, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #7aa6ff;
      letter-spacing: 2px;
    }

    .photo-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      margin: 1rem auto 0.8rem;
      background: #2a2a4a; /* fallback */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem; /* icon fallback if image missing */
      color: #c0c0ff;
    }
    /* simulate a person icon – but we'll try to display actual image from resume if possible. Since we don't have actual photo, use fontawesome user-astronaut as placeholder – but style to feel like a person */
    .photo-img img {
      display: none; /* we use background color + icon, because no actual file – but to stay true to "photo", I'll use an astronaut as cool placeholder – you can replace url later */
    }
    /* BUT i'll add an actual 'photo' feeling using a canvas element? No, I'll put a nice generative person-like shape using fontawesome icon in a circle – it's abstract but fits 3D vibe */
    .photo-img i {
      font-size: 5rem;
      filter: drop-shadow(0 4px 8px black);
    }

    .photo-caption {
      font-size: 1.2rem;
      font-weight: 300;
      color: #dbdbff;
      margin-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 0.8rem;
    }
    .photo-caption i {
      margin: 0 4px;
      color: #ffd966;
    }

    /* resume highlights bottom center (optional) */
    .mini-resume {
      pointer-events: auto;
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
      display: flex;
      gap: 2rem;
      color: #ccc;
    }
    .mini-resume span i {
      margin-right: 6px;
      color: #80b4ff;
    }

    /* canvas 3D container */
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- UI Overlay – exactly matches wr.png structure plus resume info -->
  <div class="ui-overlay">
    <!-- top navigation -->
    <div style="display: flex; justify-content: center; width: 100%;">
      <div class="nav-bar">
        <div class="nav-links">
          <span>Home</span>
          <span>Works</span>
          <span>Services</span>
          <span>Pages</span>
          <span>About</span>
          <span>Blog</span>
          <span>Contact</span>
        </div>
        <div class="lets-talk">Let's Talk</div>
      </div>
    </div>

    <!-- left hero (exactly "Hi There, I Am Jony  Creative Director  View Works") -->
    <div class="hero-section">
      <div class="hero-greeting">
        Hi There, I Am Jony
        <small>based in India</small>
      </div>
      <div class="hero-title">Creative Director & Software Engineer</div>
      <div class="view-works-btn">View Works</div>
    </div>

    <!-- right photo card with name JONY. and photo placeholder + resume bits -->
    <div class="photo-card">
      <div class="photo-name">JONY.</div>
      <!-- photo representation: using an icon that suggests a person, as we don't have actual photo. In real scenario you'd place <img src='myphoto.jpg'> -->
      <div class="photo-img">
        <i class="fas fa-user-astronaut"></i>
        <!-- you can replace the above with <img src="your-photo.jpg" style="width:100%; height:100%; border-radius:50%; display:block;"> once you have a file named 'profile.jpg' in same folder -->
      </div>
      <div class="photo-caption">
        <i class="fas fa-map-pin"></i> CS grad '24 · GATE 2025 <br>
        <span style="font-size:1rem;">AWS · ML · C++</span>
      </div>
    </div>

    <!-- tiny resume bar with key facts from the PDF -->
    <div class="mini-resume">
      <span><i class="fas fa-graduation-cap"></i> Galgotias Univ 71.6% (2024)</span>
      <span><i class="fas fa-code"></i> WhatsApp Analyzer 94% acc</span>
      <span><i class="fas fa-cloud"></i> AWS AICTE intern</span>
      <span><i class="fas fa-trophy"></i> GATE 2025 · STET 2025</span>
    </div>
  </div>

  <!-- Three.js libraries -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

    // --- setup scene, camera, renderer ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0b1f); // deep navy

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 3, 12);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // not heavily used but adds depth
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // controls – allow user to rotate around, but autoRotate to show 3D
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.5;
    controls.enableZoom = true;
    controls.enablePan = false;
    controls.maxPolarAngle = Math.PI / 2; // keep below horizon
    controls.target.set(0, 1.5, 0);

    // --- LIGHTS ---
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
    dirLight.position.set(2, 5, 5);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    scene.add(dirLight);

    const fillLight = new THREE.PointLight(0x4466ff, 0.5);
    fillLight.position.set(-3, 2, 4);
    scene.add(fillLight);

    // back rim light
    const backLight = new THREE.PointLight(0x77aaff, 0.6);
    backLight.position.set(0, 3, -8);
    scene.add(backLight);

    // --- 3D objects that represent resume items / skills / projects ---
    
    // 1. Central pedestal / stage (abstract shape)
    const stageGeo = new THREE.CylinderGeometry(3.5, 3.5, 0.4, 64);
    const stageMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, emissive: 0x111125, roughness: 0.4, metalness: 0.1 });
    const stage = new THREE.Mesh(stageGeo, stageMat);
    stage.position.set(0, -0.2, 0);
    stage.receiveShadow = true;
    stage.castShadow = true;
    scene.add(stage);

    // 2. Floating "resume blocks" – each representing education, projects, skills
    function createResumeBlock(color, pos, scale, textTag) {
      const geom = new THREE.BoxGeometry(1.2, 0.5, 0.8);
      const mat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x221133, transparent: true, opacity: 0.9 });
      const block = new THREE.Mesh(geom, mat);
      block.position.set(pos.x, pos.y, pos.z);
      block.scale.set(scale.x, scale.y, scale.z);
      block.castShadow = true;
      block.receiveShadow = true;
      
      // add wireframe for techy look
      const edges = new THREE.EdgesGeometry(geom);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xaaccff }));
      block.add(line);
      
      // tiny icon inside? we'll just attach a small sphere or star as label
      return block;
    }

    // education block
    const eduBlock = createResumeBlock(0x4a6fa5, { x: -1.8, y: 0.5, z: 1.2 }, { x: 1, y: 1, z: 1 });
    scene.add(eduBlock);
    // project block (WhatsApp analyzer)
    const projBlock = createResumeBlock(0x9f5f80, { x: 1.6, y: 0.8, z: -1.4 }, { x: 1.2, y: 0.6, z: 1 });
    scene.add(projBlock);
    // certification block (AWS, Cisco)
    const certBlock = createResumeBlock(0x3f7e6b, { x: 0.2, y: 0.2, z: 2.0 }, { x: 1, y: 0.5, z: 0.8 });
    scene.add(certBlock);

    // 3. Floating orbs with micro icons (represent skills: C++, ML, cloud)
    const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0x442200 });
    const skillPositions = [
      { x: -2.0, y: 1.2, z: -1.0, color: 0xff6666 }, // C++
      { x: 2.2, y: 1.4, z: 0.8, color: 0x66ccff },   // ML
      { x: -0.5, y: 1.6, z: -1.9, color: 0x88dd88 }, // cloud
      { x: 1.2, y: 0.9, z: 1.8, color: 0xbb88ff },   // networking
    ];
    skillPositions.forEach((pos) => {
      const geom = new THREE.SphereGeometry(0.35, 32, 32);
      const mat = new THREE.MeshStandardMaterial({ color: pos.color, emissive: 0x332233, roughness: 0.2 });
      const sphere = new THREE.Mesh(geom, mat);
      sphere.position.set(pos.x, pos.y, pos.z);
      sphere.castShadow = true;
      sphere.receiveShadow = true;
      scene.add(sphere);
      
      // tiny ring around
      const ringGeo = new THREE.TorusGeometry(0.45, 0.03, 16, 100);
      const ringMat = new THREE.MeshStandardMaterial({ color: 0xddeeff, emissive: 0x114477 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI/2;
      ring.rotation.z = 0.3;
      ring.position.set(pos.x, pos.y, pos.z);
      scene.add(ring);
    });

    // 4. Floating tiny cubes with letters? (just for vibe)
    for (let i = 0; i < 12; i++) {
      const size = 0.1 + Math.random()*0.15;
      const geom = new THREE.BoxGeometry(size, size, size);
      const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0x808080 + 0x808080, emissive: 0x111122 });
      const cube = new THREE.Mesh(geom, mat);
      const angle = (i / 12) * Math.PI * 2;
      const radius = 2.8;
      cube.position.set(
        Math.cos(angle)*radius,
        0.4 + Math.sin(i*2)*0.5,
        Math.sin(angle)*radius
      );
      cube.castShadow = true;
      scene.add(cube);
    }

    // 5. A "book" or "document" shape (represents PDF resume)
    const bookGroup = new THREE.Group();
    const bookCover = new THREE.BoxGeometry(1.6, 0.1, 2.2);
    const coverMat = new THREE.MeshStandardMaterial({ color: 0xcf9f4a });
    const cover = new THREE.Mesh(bookCover, coverMat);
    cover.position.y = 0.05;
    cover.castShadow = true;
    cover.receiveShadow = true;
    bookGroup.add(cover);
    
    const pages = new THREE.BoxGeometry(1.5, 0.15, 2.1);
    const pagesMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
    const pageMesh = new THREE.Mesh(pages, pagesMat);
    pageMesh.position.y = 0.12;
    pageMesh.castShadow = true;
    bookGroup.add(pageMesh);
    
    bookGroup.position.set(-0.8, 0.35, -1.7);
    bookGroup.rotation.y = 0.5;
    scene.add(bookGroup);

    // 6. Some floating stars or particles
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 400;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      starsPositions[i] = (Math.random() - 0.5) * 30;
      starsPositions[i+1] = (Math.random() - 0.5) * 20;
      starsPositions[i+2] = (Math.random() - 0.5) * 30 - 10; // spread behind and front
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.7 });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // 7. ground reflection / subtle grid
    const gridHelper = new THREE.GridHelper(20, 20, 0x77aaff, 0x334466);
    gridHelper.position.y = -0.3;
    scene.add(gridHelper);

    // additional abstract rings surrounding
    const ringGeoBig = new THREE.TorusGeometry(4.0, 0.08, 16, 100);
    const ringMatBig = new THREE.MeshStandardMaterial({ color: 0x88aadd, emissive: 0x112244 });
    const bigRing = new THREE.Mesh(ringGeoBig, ringMatBig);
    bigRing.rotation.x = Math.PI / 2;
    bigRing.rotation.z = 0.2;
    bigRing.position.y = 1.2;
    scene.add(bigRing);

    const ringGeoSmall = new THREE.TorusGeometry(2.5, 0.05, 16, 80);
    const ringMatSmall = new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0x331100 });
    const smallRing = new THREE.Mesh(ringGeoSmall, ringMatSmall);
    smallRing.rotation.x = Math.PI / 2 + 0.2;
    smallRing.rotation.z = -0.3;
    smallRing.position.y = 1.6;
    scene.add(smallRing);

    // --- animation loop ---
    function animate() {
      requestAnimationFrame(animate);

      // subtle floating animations for some objects
      const time = Date.now() * 0.001;
      eduBlock.rotation.y += 0.002;
      projBlock.rotation.x += 0.003;
      certBlock.rotation.z += 0.001;
      bigRing.rotation.y += 0.001;
      smallRing.rotation.y -= 0.0015;
      stars.rotation.y += 0.0002;

      controls.update(); // for auto-rotate

      renderer.render(scene, camera);
    }

    animate();

    // resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
